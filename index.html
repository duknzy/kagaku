<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" id="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0b0e14">
    <title>RB-28 Chem Hybrid Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap');
        :root { --f1-red: #e10600; --rb-navy: #0b0e14; }

        html, body {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; 
            margin: 0; padding: 0;
            background-color: #0b0e14;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            touch-action: manipulation; overscroll-behavior: none;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        #custom-bg, #bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        #custom-bg {
            background-size: cover; background-position: center; z-index: -2; transition: background-image 0.5s ease;
        }
        #bg-overlay {
            background: rgba(11, 14, 20, 0.65); z-index: -1; /* 透明度を少し上げて明るくした */
        }

        #app { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom)) 1rem; 
            z-index: 10; scrollbar-width: none; 
        }
        #app::-webkit-scrollbar { display: none; }
        
        sub { font-size: 0.65em; bottom: -0.2em; position: relative; }
        sup { font-size: 0.65em; top: -0.4em; position: relative; }

        /* メインパネルの薄さを調整 (rgbaのアルファ値とblurを微調整) */
        .race-card {
            background: rgba(11, 14, 20, 0.65); /* 0.85から0.65へ */
            backdrop-filter: blur(8px); /* 12pxから8pxへ */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tab-btn {
            white-space: nowrap; padding: 1rem 1.5rem; font-weight: bold; font-family: 'Chakra Petch';
            border-bottom: 3px solid transparent; color: #64748b; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .tab-btn.active { border-bottom-color: var(--f1-red); color: #ffffff; text-shadow: 0 0 10px rgba(225,6,0,0.5); }
        .sub-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem; transition: all 0.2s; cursor: pointer;
        }
        .sub-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.1); }
        .tire-btn { opacity: 0.5; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s; }
        .tire-btn.active { opacity: 1; border-width: 2px; transform: scale(1.05); }
        .tire-soft.active { border-color: #ef4444; color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        .tire-medium.active { border-color: #eab308; color: #eab308; box-shadow: 0 0 10px rgba(234,179,8,0.3); }
        .tire-hard.active { border-color: #f8fafc; color: #f8fafc; box-shadow: 0 0 10px rgba(248,250,252,0.3); }
        
        .option-btn { transition: all 0.1s; cursor: pointer; }
        .option-btn:active:not(:disabled) { transform: scale(0.96); background: rgba(255, 255, 255, 0.2); }
        .option-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .f1-font { font-family: 'Chakra Petch', sans-serif; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body>

    <div id="custom-bg"></div>
    <div id="bg-overlay"></div>

    <div id="stint-timer-hud" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] bg-black/80 border-b-2 border-red-600 px-6 py-2 rounded-b-xl flex items-center gap-4 shadow-2xl backdrop-blur-md">
        <div class="flex flex-col items-start">
            <span class="text-[8px] text-red-500 font-bold uppercase tracking-tighter leading-none">Live Stint Time</span>
            <span id="stint-clock" class="f1-font text-white text-xl font-bold leading-none">00:00</span>
        </div>
        <div id="red-flag-indicator" class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
            <span class="text-[10px] text-yellow-500 font-bold uppercase">Garage</span>
        </div>
    </div>

    <div id="app" class="w-full max-w-6xl mx-auto flex flex-col">
        
        <div id="gate-wrap" class="flex flex-col justify-center min-h-[80vh] pt-12">
            <div id="gate-screen" class="race-card p-8 rounded-2xl text-center w-full max-w-md mx-auto shadow-2xl animate-slide-in">
                <div class="flex justify-center mb-6">
                    <img id="gate-app-icon" src="" class="w-24 h-24 rounded-2xl border-2 border-gray-700 object-cover shadow-lg hidden">
                </div>
                <h1 class="f1-font text-5xl mb-2 font-bold text-white italic tracking-wider">RB<span class="text-red-600">-28</span></h1>
                <p class="text-gray-400 font-mono text-xs uppercase tracking-[0.4em] mb-12">Chem Hybrid Evolution</p>
                <button id="gate-login-btn" class="w-full f1-font bg-white text-black px-8 py-4 rounded-xl font-bold uppercase active:scale-95 transition-all shadow-[0_0_15px_rgba(255,255,255,0.4)]">Engage Engine</button>
            </div>
        </div>

        <div id="start-screen" class="hidden flex flex-col flex-1 mt-12 animate-slide-in w-full pb-10">
            <div class="flex justify-between items-end border-b border-gray-700 pb-4 px-2">
                <div class="flex items-center gap-3">
                    <div id="paddock-icon-container" class="w-8 h-8 rounded-full bg-gray-800 border border-gray-500 overflow-hidden flex items-center justify-center hidden">
                        <img id="paddock-app-icon" src="" class="w-full h-full object-cover">
                    </div>
                    <div id="default-paddock-icon" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                    <p id="user-name" class="f1-font text-xl text-white font-bold">HIRO</p>
                </div>
                <div class="text-right">
                    <span class="text-[8px] text-gray-500 uppercase tracking-widest block">Stint Status</span>
                    <span class="f1-font text-sm text-green-500 font-bold">OPTIMAL</span>
                </div>
            </div>

            <div id="sector-tabs" class="flex overflow-x-auto border-b border-gray-800 mt-2 no-scrollbar shrink-0"></div>
            <div id="sub-sector-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3 mt-4 content-start"></div>
        </div>

        <div id="setup-modal" class="hidden fixed inset-0 z-[110] bg-black/80 flex items-end">
            <div class="w-full bg-gray-900 rounded-t-3xl p-6 animate-slide-up border-t-2 border-red-600">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="setup-sector-name" class="text-[10px] text-red-500 font-bold uppercase tracking-widest">SECTOR 1</span>
                        <h3 id="setup-sub-name" class="f1-font text-2xl font-bold text-white italic">SUB CATEGORY</h3>
                    </div>
                    <button onclick="quiz.closeSetup()" class="text-gray-500 text-3xl">&times;</button>
                </div>

                <div class="space-y-6">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3">Tire Strategy (Question Count)</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="quiz.setTire(10, 'soft')" id="tire-soft" class="tire-btn tire-soft bg-black/40 py-3 rounded-lg f1-font text-xs font-bold uppercase">Soft (10)</button>
                            <button onclick="quiz.setTire(20, 'medium')" id="tire-medium" class="tire-btn tire-medium active bg-black/40 py-3 rounded-lg f1-font text-xs font-bold uppercase">Med (20)</button>
                            <button onclick="quiz.setTire(999, 'hard')" id="tire-hard" class="tire-btn tire-hard bg-black/40 py-3 rounded-lg f1-font text-xs font-bold uppercase">All</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center justify-between bg-black/30 p-4 rounded-lg border border-gray-800">
                            <span class="text-xs font-bold text-gray-300">REVERSE GRID</span>
                            <input type="checkbox" id="reverse-mode" class="w-5 h-5 accent-red-600">
                        </label>
                    </div>
                    <button onclick="quiz.startRace()" class="w-full f1-font bg-red-600 text-white py-5 rounded-xl font-bold uppercase text-xl shadow-lg active:scale-95 transition-all">Start Race</button>
                </div>
            </div>
        </div>

        <div id="quiz-wrap" class="hidden flex flex-col justify-center min-h-[80vh] pt-12">
            <div id="quiz-screen" class="race-card p-6 rounded-2xl shadow-2xl flex flex-col justify-between w-full max-w-4xl mx-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="quiz-title" class="f1-font text-[10px] text-gray-400 uppercase tracking-widest">SECTION</span>
                        <h4 id="lap-counter" class="f1-font text-white font-bold text-xl">LAP 1/20</h4>
                    </div>
                    <div id="timer" class="f1-font text-3xl text-yellow-400 font-mono tracking-tighter">0.00s</div>
                </div>
                
                <div class="flex-grow flex flex-col justify-center items-center py-4">
                    <h2 id="target-word" class="font-bold text-white text-lg md:text-2xl max-w-2xl w-full text-left border-l-4 border-red-600 pl-4 py-2 leading-relaxed bg-black/40 rounded-r-lg"></h2>
                    <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-10 w-full max-w-2xl"></div>
                </div>
                <div id="feedback" class="h-8 mt-4 mb-2 text-center font-bold uppercase tracking-widest"></div>
            </div>
        </div>

        <div id="result-wrap" class="hidden flex flex-col justify-center min-h-[80vh] pt-12">
            <div id="result-screen" class="race-card p-8 rounded-2xl shadow-2xl text-center flex flex-col justify-center items-center w-full max-w-2xl mx-auto">
                <h2 class="f1-font text-4xl mb-2 font-bold text-white italic">CHECKERED FLAG</h2>
                <div id="accuracy-display" class="f1-font text-8xl font-bold mb-4 text-white">0%</div>
                <p id="rank-text" class="text-gray-400 font-mono mb-10">P1: MAX VERSTAPPEN</p>
                <button onclick="quiz.returnToPaddock()" class="w-full max-w-sm f1-font bg-red-600 text-white py-4 rounded-xl font-bold uppercase shadow-lg shadow-red-900/50">Return to Paddock</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        document.addEventListener('dblclick', function(event) { event.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', function(event) { if (event.scale !== 1) { event.preventDefault(); } }, { passive: false });

        class ChemQuizV10 {
            constructor() {
                if (typeof appData === 'undefined') {
                    alert("Telemetry Error: data.js が見つからない。同じフォルダに作成しろ。");
                    return;
                }

                this.masterQuestions = [];
                this.questions = [];
                this.globalAnswers = [];
                this.globalQuestions = [];
                this.currentIndex = 0;
                this.missCount = 0;
                this.tireLimit = 20;
                this.stintTime = 0;
                this.stintInterval = null;
                this.stintActive = false;
                this.isLocked = false; 

                this.applyConfig(); 
                this.buildGlobalPool();
                this.initStint();
                this.initUI();
            }

            applyConfig() {
                if (typeof appConfig === 'undefined') return;
                
                if (appConfig.wallpaperUrl) {
                    document.getElementById('custom-bg').style.backgroundImage = `url('${appConfig.wallpaperUrl}')`;
                }
                
                if (appConfig.appIconUrl) {
                    const gateIcon = document.getElementById('gate-app-icon');
                    gateIcon.src = appConfig.appIconUrl;
                    gateIcon.classList.remove('hidden');

                    const paddockIconContainer = document.getElementById('paddock-icon-container');
                    const paddockIcon = document.getElementById('paddock-app-icon');
                    const defaultIcon = document.getElementById('default-paddock-icon');
                    paddockIcon.src = appConfig.appIconUrl;
                    paddockIconContainer.classList.remove('hidden');
                    defaultIcon.classList.add('hidden');
                    document.getElementById('apple-touch-icon').href = appConfig.appIconUrl;
                }
            }

            buildGlobalPool() {
                let ansPool = [];
                let qPool = [];
                for (let cat in appData) {
                    for (let sub in appData[cat]) {
                        const raw = appData[cat][sub];
                        const parsed = raw.trim().split('\n').map(line => {
                            const m = line.match(/^(?:\d+\.\s*)?(.*?)(?:【解答】|\[解答\])\s*(.*)$/);
                            return m ? { q: m[1].trim(), a: m[2].trim() } : null;
                        }).filter(x => x);
                        parsed.forEach(p => { ansPool.push(p.a); qPool.push(p.q); });
                    }
                }
                this.globalAnswers = [...new Set(ansPool)];
                this.globalQuestions = [...new Set(qPool)];
            }

            formatChem(text) {
                if (!text) return "";
                let formatted = text.replace(/\((\d*[\+\-])\)/g, '<sup>$1</sup>');
                formatted = formatted.replace(/([a-zA-Z\]])(\d+[\+\-]|[\+\-])(?![a-zA-Z0-9])/g, '$1<sup>$2</sup>');
                formatted = formatted.replace(/([a-zA-Z\)])(\d+)/g, '$1<sub>$2</sub>');
                return formatted;
            }

            initStint() {
                const today = new Date().toDateString();
                if (localStorage.getItem('chem_date') === today) {
                    this.stintTime = parseInt(localStorage.getItem('chem_time')) || 0;
                } else {
                    localStorage.setItem('chem_date', today);
                }
                this.updateHUD();
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden && this.stintActive) this.pauseTimer();
                    else if (!document.hidden && this.stintActive) this.resumeTimer();
                });
            }

            initUI() {
                document.getElementById('gate-login-btn').onclick = () => {
                    document.getElementById('gate-wrap').classList.add('hidden');
                    document.getElementById('start-screen').classList.remove('hidden');
                    this.stintActive = true;
                    this.resumeTimer();
                    this.renderTabs();
                };
            }

            renderTabs() {
                const container = document.getElementById('sector-tabs');
                const categories = Object.keys(appData);
                container.innerHTML = categories.map((cat, i) => 
                    `<button class="tab-btn ${i===0?'active':''}" onclick="quiz.switchTab('${cat}', this)">${cat}</button>`
                ).join('');
                this.switchTab(categories[0], container.firstChild);
            }

            switchTab(cat, btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const grid = document.getElementById('sub-sector-grid');
                grid.innerHTML = Object.entries(appData[cat]).map(([name, data]) => {
                    const count = data.trim().split('\n').filter(l => l.includes('【解答】') || l.includes('[解答]')).length;
                    return `
                        <div class="sub-card p-4 flex flex-col justify-center items-center h-28" onclick="quiz.openSetup('${cat}', '${name}')">
                            <h4 class="text-white font-bold text-sm text-center mb-1">${name}</h4>
                            <span class="f1-font text-[10px] text-red-500">${count} Qs</span>
                        </div>
                    `;
                }).join('');
            }

            openSetup(cat, sub) {
                this.currentCat = cat;
                this.currentSub = sub;
                document.getElementById('setup-sector-name').innerText = cat;
                document.getElementById('setup-sub-name').innerText = sub;
                document.getElementById('setup-modal').classList.remove('hidden');
            }

            closeSetup() { document.getElementById('setup-modal').classList.add('hidden'); }

            setTire(limit, type) {
                this.tireLimit = limit;
                document.querySelectorAll('.tire-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tire-${type}`).classList.add('active');
            }

            startRace() {
                const raw = appData[this.currentCat][this.currentSub];
                const parsed = raw.trim().split('\n').map(line => {
                    const m = line.match(/^(?:\d+\.\s*)?(.*?)(?:【解答】|\[解答\])\s*(.*)$/);
                    return m ? { q: m[1].trim(), a: m[2].trim() } : null;
                }).filter(x => x);

                if (parsed.length === 0) { alert("No valid data found in this sector."); return; }

                this.masterQuestions = parsed;
                this.isReverse = document.getElementById('reverse-mode').checked;
                this.questions = [...parsed].sort(() => Math.random() - 0.5).slice(0, this.tireLimit);
                this.currentIndex = 0;
                this.missCount = 0;
                this.isLocked = false;
                this.startTime = Date.now();
                
                this.closeSetup();
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-wrap').classList.remove('hidden');
                
                this.lapInterval = setInterval(() => {
                    document.getElementById('timer').innerText = ((Date.now() - this.startTime)/1000).toFixed(2) + 's';
                }, 50);
                this.showQuestion();
            }

            showQuestion() {
                const q = this.questions[this.currentIndex];
                document.getElementById('lap-counter').innerText = `LAP ${this.currentIndex + 1}/${this.questions.length}`;
                
                const rawQText = this.isReverse ? q.a : q.q;
                document.getElementById('target-word').innerHTML = this.formatChem(rawQText);
                
                const ans = this.isReverse ? q.q : q.a;
                let globalPool = this.isReverse ? this.globalQuestions : this.globalAnswers;
                let pool = globalPool.filter(x => x !== ans);

                pool.sort((a, b) => {
                    let scoreA = 0; let scoreB = 0;
                    scoreA -= Math.abs(a.length - ans.length);
                    scoreB -= Math.abs(b.length - ans.length);
                    const hasA = (str) => /A[:：]/.test(str);
                    if (hasA(ans)) {
                        if (hasA(a)) scoreA += 100; if (hasA(b)) scoreB += 100;
                    } else {
                        if (hasA(a)) scoreA -= 100; if (hasA(b)) scoreB -= 100;
                    }
                    const hasIneq = (str) => /[<><＞＜]/.test(str);
                    if (hasIneq(ans)) {
                        if (hasIneq(a)) scoreA += 100; if (hasIneq(b)) scoreB += 100;
                    } else {
                        if (hasIneq(a)) scoreA -= 100; if (hasIneq(b)) scoreB -= 100;
                    }
                    return scoreB - scoreA; 
                });

                let topCandidates = pool.slice(0, 8).sort(() => Math.random() - 0.5);
                let distractors = topCandidates.slice(0, 3);

                if (!this.isReverse && /A[:：].*B[:：]/.test(ans)) {
                    let swapped = ans.replace(/(A[:：])([^,、]+)([,、]\s*B[:：])(.+)/, '$1$4$3$2');
                    if (swapped !== ans && !distractors.includes(swapped)) {
                        distractors.pop(); distractors.push(swapped); 
                    }
                }

                while (distractors.length < 3) distractors.push(`[Dummy] データ不足 ${distractors.length + 1}`);

                let options = [ans, ...distractors].sort(() => Math.random() - 0.5);

                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn bg-gray-800 text-white p-4 rounded-xl border border-gray-700 text-left text-sm md:text-base font-bold shadow-lg";
                    btn.innerHTML = this.formatChem(opt);
                    btn.onclick = () => this.handleAns(opt, ans);
                    container.appendChild(btn);
                });
            }

            handleAns(selected, correct) {
                if (this.isLocked) return;
                this.isLocked = true;

                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => {
                    b.disabled = true;
                    if(b.innerHTML === this.formatChem(correct)) {
                        b.style.borderColor = '#39ff14';
                        b.style.boxShadow = '0 0 15px rgba(57,255,20,0.3)';
                    } else if (b.innerHTML === this.formatChem(selected) && selected !== correct) {
                        b.style.borderColor = '#e10600';
                        b.style.boxShadow = '0 0 15px rgba(225,6,0,0.3)';
                    }
                });

                const feedback = document.getElementById('feedback');
                
                if (selected === correct) {
                    feedback.innerHTML = '<span class="text-green-500">PURPLE SECTOR</span>';
                    setTimeout(() => {
                        feedback.innerText = "";
                        this.currentIndex++;
                        this.isLocked = false;
                        if (this.currentIndex < this.questions.length) this.showQuestion();
                        else this.finish();
                    }, 400);
                } else {
                    this.missCount++;
                    feedback.innerHTML = '<span class="text-red-600">DAMAGE DETECTED</span>';
                    
                    // --- スリップストリーム・シャッフル（Slipstream Shuffle） ---
                    // 単純に一番後ろに置くのではなく、残りの未解答プールの中にランダムに挿入する
                    const remainingQuestions = this.questions.length - (this.currentIndex + 1);
                    
                    if (remainingQuestions <= 1) {
                        // 残りが1問以下の場合は、仕方ないので一番後ろに入れる
                        this.questions.push(this.questions[this.currentIndex]);
                    } else {
                        // 残りの問題のどこかにランダムに割り込ませる
                        const insertIndex = this.currentIndex + 1 + Math.floor(Math.random() * remainingQuestions);
                        this.questions.splice(insertIndex, 0, this.questions[this.currentIndex]);
                    }
                    
                    setTimeout(() => { 
                        feedback.innerText = ""; 
                        this.isLocked = false; 
                        this.showQuestion(); 
                    }, 1500);
                }
            }

            finish() {
                clearInterval(this.lapInterval);
                document.getElementById('quiz-wrap').classList.add('hidden');
                document.getElementById('result-wrap').classList.remove('hidden');
                const acc = ((this.questions.length - this.missCount) / this.questions.length * 100).toFixed(1);
                document.getElementById('accuracy-display').innerText = `${acc}%`;
                
                const m = String(Math.floor(this.missCount)).padStart(2, '0');
                document.getElementById('rank-text').innerHTML = `TIME: <span class="text-white">${document.getElementById('timer').innerText}</span><br>MISSES: <span class="${this.missCount > 0 ? 'text-red-500' : 'text-green-500'}">${m}</span>`;
            }

            returnToPaddock() {
                document.getElementById('result-wrap').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            }

            resumeTimer() {
                this.pauseTimer();
                const ind = document.getElementById('red-flag-indicator');
                ind.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div><span class="text-[10px] text-green-500 font-bold uppercase">Green Flag</span>`;
                this.stintInterval = setInterval(() => {
                    this.stintTime++;
                    localStorage.setItem('chem_time', this.stintTime);
                    this.updateHUD();
                }, 1000);
            }

            pauseTimer() {
                clearInterval(this.stintInterval);
                const ind = document.getElementById('red-flag-indicator');
                if(ind) ind.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-600"></div><span class="text-[10px] text-red-600 font-bold uppercase">Red Flag</span>`;
            }

            updateHUD() {
                const m = String(Math.floor(this.stintTime / 60)).padStart(2, '0');
                const s = String(this.stintTime % 60).padStart(2, '0');
                document.getElementById('stint-clock').innerText = `${m}:${s}`;
            }
        }
        
        window.quiz = new ChemQuizV10();
    </script>
</body>
</html>
