<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" id="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0b0e14">
    <title>RB-28 Chem Hybrid Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap');
        :root { --f1-red: #e10600; --rb-navy: #0b0e14; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: transparent;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        #custom-bg-img {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.5); /* コントラストを高めるために少し暗く */
        }

        .carbon-bg {
            background-image: none;
            background-color: transparent;
        }

        .f1-font { font-family: 'Chakra Petch', sans-serif; }

        #app {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 10;
        }
        #app::-webkit-scrollbar { display: none; }
        
        sub { font-size: 0.65em; bottom: -0.2em; position: relative; }
        sup { font-size: 0.65em; top: -0.4em; position: relative; }

        /* 英単語アプリ基準の美しいグラスモーフィズムカード */
        .race-card {
            background: rgba(11, 14, 20, 0.75); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .tab-btn {
            white-space: nowrap; padding: 1rem 1.5rem; font-weight: bold; font-family: 'Chakra Petch';
            border-bottom: 3px solid transparent; color: #64748b; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .tab-btn.active { border-bottom-color: var(--f1-red); color: #ffffff; text-shadow: 0 0 10px rgba(225,6,0,0.5); }
        
        .sub-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem; transition: all 0.2s; cursor: pointer;
        }
        .sub-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); }
        
        .tire-btn { opacity: 0.5; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s; }
        .tire-btn.active { opacity: 1; border-width: 2px; transform: scale(1.05); }
        .tire-soft.active { border-color: #ef4444; color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        .tire-medium.active { border-color: #eab308; color: #eab308; box-shadow: 0 0 10px rgba(234,179,8,0.3); }
        .tire-hard.active { border-color: #f8fafc; color: #f8fafc; box-shadow: 0 0 10px rgba(248,250,252,0.3); }
        
        /* 選択肢ボタンをスタイリッシュに */
        .option-btn { 
            transition: all 0.1s; cursor: pointer; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .option-btn:active:not(:disabled) { transform: scale(0.96); background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4); }
        .option-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="carbon-bg text-sm md:text-base">

    <img id="custom-bg-img" src="" alt="">

    <div id="stint-timer-hud" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] bg-black/80 border-b border-gray-700 px-6 py-2 rounded-b-2xl flex items-center gap-4 shadow-2xl backdrop-blur-md">
        <div class="flex flex-col items-center">
            <span class="text-[8px] text-gray-400 font-bold uppercase tracking-widest leading-none mb-1">Stint Time</span>
            <span id="stint-clock" class="f1-font text-white text-lg font-bold leading-none tracking-wider">00:00</span>
        </div>
        <div class="h-6 w-px bg-gray-700 mx-1"></div>
        <div id="red-flag-indicator" class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse shadow-[0_0_8px_#eab308]"></div>
            <span class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Garage</span>
        </div>
    </div>

    <div id="app" class="w-full max-w-6xl mx-auto flex flex-col">
        
        <div id="gate-screen" class="race-card p-8 rounded-3xl shadow-2xl text-center relative overflow-hidden animate-slide-in my-auto max-w-md mx-auto w-full">
            <div class="flex justify-center mb-8">
                <img id="gate-app-icon" src="" class="w-28 h-28 rounded-3xl border border-gray-700 object-cover shadow-2xl hidden">
            </div>
            <h1 class="f1-font text-5xl mb-2 font-bold text-white tracking-widest">RB<span class="text-red-600">-28</span></h1>
            <p class="text-gray-400 font-mono text-[10px] uppercase tracking-[0.5em] mb-12">Chem Evolution</p>
            <button id="gate-login-btn" class="w-full f1-font bg-white hover:bg-gray-200 text-black px-8 py-4 rounded-xl font-bold uppercase tracking-widest active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)]">Engage Engine</button>
        </div>

        <div id="start-screen" class="hidden race-card p-6 md:p-8 rounded-3xl relative z-10 animate-slide-in my-auto w-full max-w-4xl mx-auto shadow-2xl">
            <div class="flex justify-between items-end border-b border-gray-700 pb-6 px-2">
                <div class="flex items-center gap-4">
                    <div id="paddock-icon-container" class="w-10 h-10 rounded-xl bg-gray-800 border border-gray-600 overflow-hidden flex items-center justify-center shadow-lg hidden">
                        <img id="paddock-app-icon" src="" class="w-full h-full object-cover">
                    </div>
                    <div id="default-paddock-icon" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                    <p id="user-name" class="f1-font text-2xl text-white font-bold tracking-wide">HIRO</p>
                </div>
                <div class="text-right">
                    <span class="text-[9px] text-gray-400 uppercase tracking-[0.2em] block mb-1">System Status</span>
                    <span class="f1-font text-base text-green-400 font-bold tracking-widest">OPTIMAL</span>
                </div>
            </div>

            <div id="sector-tabs" class="flex overflow-x-auto border-b border-gray-800 mt-4 no-scrollbar shrink-0"></div>
            <div id="sub-sector-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-6"></div>
        </div>

        <div id="setup-modal" class="hidden fixed inset-0 z-[110] bg-black/60 backdrop-blur-sm flex items-end">
            <div class="w-full bg-gray-900/95 rounded-t-[2rem] p-8 animate-slide-up border-t border-gray-700 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span id="setup-sector-name" class="text-[10px] text-red-500 font-bold uppercase tracking-[0.2em]">SECTOR</span>
                        <h3 id="setup-sub-name" class="f1-font text-3xl font-bold text-white tracking-wide mt-1">CATEGORY</h3>
                    </div>
                    <button onclick="quiz.closeSetup()" class="text-gray-500 hover:text-white transition text-3xl">&times;</button>
                </div>

                <div class="space-y-8 max-w-lg mx-auto">
                    <div>
                        <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-4 text-center">Tire Strategy</p>
                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="quiz.setTire(10, 'soft')" id="tire-soft" class="tire-btn tire-soft bg-black/40 py-4 rounded-xl f1-font text-sm font-bold uppercase">Soft (10)</button>
                            <button onclick="quiz.setTire(20, 'medium')" id="tire-medium" class="tire-btn tire-medium active bg-black/40 py-4 rounded-xl f1-font text-sm font-bold uppercase">Med (20)</button>
                            <button onclick="quiz.setTire(999, 'hard')" id="tire-hard" class="tire-btn tire-hard bg-black/40 py-4 rounded-xl f1-font text-sm font-bold uppercase">All</button>
                        </div>
                    </div>
                    <div class="flex justify-center">
                        <label class="flex items-center gap-4 bg-black/40 px-6 py-4 rounded-xl border border-gray-800 cursor-pointer hover:border-gray-600 transition">
                            <span class="text-sm font-bold text-gray-300 tracking-wider">REVERSE GRID</span>
                            <input type="checkbox" id="reverse-mode" class="w-6 h-6 accent-red-600">
                        </label>
                    </div>
                    <button onclick="quiz.startRace()" class="w-full f1-font bg-red-600 hover:bg-red-500 text-white py-5 rounded-xl font-bold uppercase text-xl shadow-[0_0_20px_rgba(225,6,0,0.4)] active:scale-95 transition-all mt-4">Start Session</button>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="hidden race-card p-6 md:p-10 rounded-3xl shadow-2xl relative flex flex-col justify-between my-auto min-h-[500px] w-full max-w-3xl mx-auto z-20">
            <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
                <div>
                    <span id="quiz-title" class="f1-font text-[10px] text-gray-400 uppercase tracking-[0.2em] block mb-1">SECTION</span>
                    <h4 id="lap-counter" class="f1-font text-white font-bold text-2xl tracking-wide">LAP 1/20</h4>
                </div>
                <div id="timer" class="f1-font text-4xl text-yellow-400 font-bold tracking-tighter drop-shadow-[0_0_10px_rgba(250,204,21,0.3)]">0.00s</div>
            </div>
            
            <div class="flex-grow flex flex-col justify-center items-center py-4 w-full">
                <div class="text-center w-full px-2 md:px-8 mb-10">
                    <h2 id="target-word" class="font-bold text-white text-xl md:text-3xl tracking-wide leading-relaxed"></h2>
                </div>
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full"></div>
            </div>
            <div id="feedback" class="h-8 mt-6 text-center f1-font text-lg font-bold uppercase tracking-widest"></div>
        </div>

        <div id="result-screen" class="hidden race-card p-10 rounded-3xl shadow-2xl text-center flex flex-col justify-center items-center my-auto max-w-md mx-auto w-full z-20">
            <h2 class="f1-font text-4xl md:text-5xl mb-4 font-bold text-white tracking-wider">CHECKERED</h2>
            <div id="accuracy-display" class="f1-font text-8xl font-bold mb-6 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">0%</div>
            <div class="bg-black/40 rounded-xl p-4 w-full mb-8 border border-gray-800">
                <p id="rank-text" class="text-gray-300 font-mono text-sm leading-relaxed tracking-wide">TIME: 0.00s<br>MISSES: 0</p>
            </div>
            <button onclick="quiz.returnToPaddock()" class="w-full f1-font bg-red-600 hover:bg-red-500 text-white py-5 rounded-xl font-bold uppercase text-lg shadow-[0_0_20px_rgba(225,6,0,0.4)] active:scale-95 transition-all">Return to Garage</button>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        document.addEventListener('dblclick', function(event) { event.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', function(event) { if (event.scale !== 1) { event.preventDefault(); } }, { passive: false });

        class ChemQuizV12 {
            constructor() {
                if (typeof appData === 'undefined') {
                    alert("Telemetry Error: data.js が見つからない。同じフォルダに作成しろ。");
                    return;
                }

                this.masterQuestions = [];
                this.questions = [];
                this.globalAnswers = [];
                this.globalQuestions = [];
                this.currentIndex = 0;
                this.missCount = 0;
                this.tireLimit = 20;
                this.stintTime = 0;
                this.stintInterval = null;
                this.stintActive = false;
                this.isLocked = false; 

                this.applyConfig(); 
                this.buildGlobalPool();
                this.initStint();
                this.initUI();
            }

            applyConfig() {
                if (typeof appConfig === 'undefined') return;
                
                if (appConfig.wallpaperUrl) {
                    document.getElementById('custom-bg-img').src = appConfig.wallpaperUrl;
                }
                
                if (appConfig.appIconUrl) {
                    const gateIcon = document.getElementById('gate-app-icon');
                    gateIcon.src = appConfig.appIconUrl;
                    gateIcon.classList.remove('hidden');

                    const paddockIconContainer = document.getElementById('paddock-icon-container');
                    const paddockIcon = document.getElementById('paddock-app-icon');
                    const defaultIcon = document.getElementById('default-paddock-icon');
                    paddockIcon.src = appConfig.appIconUrl;
                    paddockIconContainer.classList.remove('hidden');
                    defaultIcon.classList.add('hidden');
                    document.getElementById('apple-touch-icon').href = appConfig.appIconUrl;
                }
            }

            buildGlobalPool() {
                let ansPool = [];
                let qPool = [];
                for (let cat in appData) {
                    for (let sub in appData[cat]) {
                        const raw = appData[cat][sub];
                        const parsed = raw.trim().split('\n').map(line => {
                            const m = line.match(/^(?:\d+\.\s*)?(.*?)(?:【解答】|\[解答\])\s*(.*)$/);
                            return m ? { q: m[1].trim(), a: m[2].trim() } : null;
                        }).filter(x => x);
                        parsed.forEach(p => { ansPool.push(p.a); qPool.push(p.q); });
                    }
                }
                this.globalAnswers = [...new Set(ansPool)];
                this.globalQuestions = [...new Set(qPool)];
            }

            formatChem(text) {
                if (!text) return "";
                let formatted = text.replace(/\((\d*[\+\-])\)/g, '<sup>$1</sup>');
                formatted = formatted.replace(/([a-zA-Z\]])(\d+[\+\-]|[\+\-])(?![a-zA-Z0-9])/g, '$1<sup>$2</sup>');
                formatted = formatted.replace(/([a-zA-Z\)])(\d+)/g, '$1<sub>$2</sub>');
                return formatted;
            }

            initStint() {
                const today = new Date().toDateString();
                if (localStorage.getItem('chem_date') === today) {
                    this.stintTime = parseInt(localStorage.getItem('chem_time')) || 0;
                } else {
                    localStorage.setItem('chem_date', today);
                }
                this.updateHUD();
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden && this.stintActive) this.pauseTimer();
                    else if (!document.hidden && this.stintActive) this.resumeTimer();
                });
            }

            initUI() {
                document.getElementById('gate-login-btn').onclick = () => {
                    document.getElementById('gate-screen').classList.add('hidden');
                    document.getElementById('start-screen').classList.remove('hidden');
                    this.stintActive = true;
                    this.resumeTimer();
                    this.renderTabs();
                };
            }

            renderTabs() {
                const container = document.getElementById('sector-tabs');
                const categories = Object.keys(appData);
                container.innerHTML = categories.map((cat, i) => 
                    `<button class="tab-btn ${i===0?'active':''}" onclick="quiz.switchTab('${cat}', this)">${cat}</button>`
                ).join('');
                this.switchTab(categories[0], container.firstChild);
            }

            switchTab(cat, btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const grid = document.getElementById('sub-sector-grid');
                grid.innerHTML = Object.entries(appData[cat]).map(([name, data]) => {
                    const count = data.trim().split('\n').filter(l => l.includes('【解答】') || l.includes('[解答]')).length;
                    return `
                        <div class="sub-card p-6 flex flex-col justify-center items-center h-32" onclick="quiz.openSetup('${cat}', '${name}')">
                            <h4 class="text-white font-bold text-sm text-center mb-2 tracking-wide">${name}</h4>
                            <span class="f1-font text-xs text-gray-400 bg-black/50 px-3 py-1 rounded-full">${count} Qs</span>
                        </div>
                    `;
                }).join('');
            }

            openSetup(cat, sub) {
                this.currentCat = cat;
                this.currentSub = sub;
                document.getElementById('setup-sector-name').innerText = cat;
                document.getElementById('setup-sub-name').innerText = sub;
                document.getElementById('setup-modal').classList.remove('hidden');
            }

            closeSetup() { document.getElementById('setup-modal').classList.add('hidden'); }

            setTire(limit, type) {
                this.tireLimit = limit;
                document.querySelectorAll('.tire-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tire-${type}`).classList.add('active');
            }

            startRace() {
                const raw = appData[this.currentCat][this.currentSub];
                const parsed = raw.trim().split('\n').map(line => {
                    const m = line.match(/^(?:\d+\.\s*)?(.*?)(?:【解答】|\[解答\])\s*(.*)$/);
                    return m ? { q: m[1].trim(), a: m[2].trim() } : null;
                }).filter(x => x);

                if (parsed.length === 0) { alert("No valid data found in this sector."); return; }

                this.masterQuestions = parsed;
                this.isReverse = document.getElementById('reverse-mode').checked;
                this.questions = [...parsed].sort(() => Math.random() - 0.5).slice(0, this.tireLimit);
                this.currentIndex = 0;
                this.missCount = 0;
                this.isLocked = false;
                this.startTime = Date.now();
                
                this.closeSetup();
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                
                this.lapInterval = setInterval(() => {
                    document.getElementById('timer').innerText = ((Date.now() - this.startTime)/1000).toFixed(2) + 's';
                }, 50);
                this.showQuestion();
            }

            showQuestion() {
                const q = this.questions[this.currentIndex];
                document.getElementById('lap-counter').innerText = `LAP ${this.currentIndex + 1}/${this.questions.length}`;
                
                const rawQText = this.isReverse ? q.a : q.q;
                document.getElementById('target-word').innerHTML = this.formatChem(rawQText);
                
                const ans = this.isReverse ? q.q : q.a;
                let globalPool = this.isReverse ? this.globalQuestions : this.globalAnswers;
                let pool = globalPool.filter(x => x !== ans);

                pool.sort((a, b) => {
                    let scoreA = 0; let scoreB = 0;
                    scoreA -= Math.abs(a.length - ans.length);
                    scoreB -= Math.abs(b.length - ans.length);
                    const hasA = (str) => /A[:：]/.test(str);
                    if (hasA(ans)) {
                        if (hasA(a)) scoreA += 100; if (hasA(b)) scoreB += 100;
                    } else {
                        if (hasA(a)) scoreA -= 100; if (hasA(b)) scoreB -= 100;
                    }
                    const hasIneq = (str) => /[<><＞＜]/.test(str);
                    if (hasIneq(ans)) {
                        if (hasIneq(a)) scoreA += 100; if (hasIneq(b)) scoreB += 100;
                    } else {
                        if (hasIneq(a)) scoreA -= 100; if (hasIneq(b)) scoreB -= 100;
                    }
                    return scoreB - scoreA; 
                });

                let topCandidates = pool.slice(0, 8).sort(() => Math.random() - 0.5);
                let distractors = topCandidates.slice(0, 3);

                if (!this.isReverse && /A[:：].*B[:：]/.test(ans)) {
                    let swapped = ans.replace(/(A[:：])([^,、]+)([,、]\s*B[:：])(.+)/, '$1$4$3$2');
                    if (swapped !== ans && !distractors.includes(swapped)) {
                        distractors.pop(); distractors.push(swapped); 
                    }
                }

                while (distractors.length < 3) distractors.push(`[Dummy] データ不足 ${distractors.length + 1}`);

                let options = [ans, ...distractors].sort(() => Math.random() - 0.5);

                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    // ボタンのデザインを洗練。パディングを調整し、センタリング。
                    btn.className = "option-btn w-full p-4 rounded-xl text-center text-sm md:text-base font-bold tracking-wide shadow-lg backdrop-blur-sm";
                    btn.innerHTML = this.formatChem(opt);
                    btn.onclick = () => this.handleAns(opt, ans);
                    container.appendChild(btn);
                });
            }

            handleAns(selected, correct) {
                if (this.isLocked) return;
                this.isLocked = true;

                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => {
                    b.disabled = true;
                    // 正解・不正解の色付け
                    if(b.innerHTML === this.formatChem(correct)) {
                        b.style.borderColor = '#39ff14';
                        b.style.boxShadow = '0 0 15px rgba(57,255,20,0.3)';
                    } else if (b.innerHTML === this.formatChem(selected) && selected !== correct) {
                        b.style.borderColor = '#e10600';
                        b.style.boxShadow = '0 0 15px rgba(225,6,0,0.3)';
                    }
                });

                const feedback = document.getElementById('feedback');
                
                if (selected === correct) {
                    feedback.innerHTML = '<span class="text-green-400 drop-shadow-[0_0_5px_rgba(74,222,128,0.8)]">PURPLE SECTOR</span>';
                    setTimeout(() => {
                        feedback.innerText = "";
                        this.currentIndex++;
                        this.isLocked = false;
                        if (this.currentIndex < this.questions.length) this.showQuestion();
                        else this.finish();
                    }, 500); // 演出を見せるため少し延長
                } else {
                    this.missCount++;
                    feedback.innerHTML = '<span class="text-red-500 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]">DAMAGE DETECTED</span>';
                    this.questions.push(this.questions[this.currentIndex]);
                    setTimeout(() => { 
                        feedback.innerText = ""; 
                        this.isLocked = false; 
                        this.showQuestion(); 
                    }, 1500);
                }
            }

            finish() {
                clearInterval(this.lapInterval);
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                const acc = ((this.questions.length - this.missCount) / this.questions.length * 100).toFixed(1);
                document.getElementById('accuracy-display').innerText = `${acc}%`;
                
                const m = String(Math.floor(this.missCount)).padStart(2, '0');
                document.getElementById('rank-text').innerHTML = `TIME: <span class="text-white">${document.getElementById('timer').innerText}</span><br>MISSES: <span class="${this.missCount > 0 ? 'text-red-500' : 'text-green-500'}">${m}</span>`;
            }

            returnToPaddock() {
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            }

            resumeTimer() {
                this.pauseTimer();
                const ind = document.getElementById('red-flag-indicator');
                ind.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]"></div><span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Green Flag</span>`;
                this.stintInterval = setInterval(() => {
                    this.stintTime++;
                    localStorage.setItem('chem_time', this.stintTime);
                    this.updateHUD();
                }, 1000);
            }

            pauseTimer() {
                clearInterval(this.stintInterval);
                const ind = document.getElementById('red-flag-indicator');
                if(ind) ind.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-600 shadow-[0_0_8px_#e10600]"></div><span class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Red Flag</span>`;
            }

            updateHUD() {
                const m = String(Math.floor(this.stintTime / 60)).padStart(2, '0');
                const s = String(this.stintTime % 60).padStart(2, '0');
                document.getElementById('stint-clock').innerText = `${m}:${s}`;
            }
        }
        
        window.quiz = new ChemQuizV12();
    </script>
</body>
</html>
