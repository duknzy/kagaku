<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" id="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0b0e14">
    <title>RB-28 Chem Hybrid Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap');
        :root { --f1-red: #e10600; --rb-navy: #0b0e14; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: transparent;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        #custom-bg-img {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .carbon-bg {
            background-image: none;
            background-color: transparent;
        }

        .f1-font { font-family: 'Chakra Petch', sans-serif; }

        #app {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 10;
        }
        #app::-webkit-scrollbar { display: none; }
        
        sub { font-size: 0.65em; bottom: -0.2em; position: relative; }
        sup { font-size: 0.65em; top: -0.4em; position: relative; }

        .race-card {
            background: rgba(11, 14, 20, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        .tire-btn { opacity: 0.4; transform: scale(0.95); transition: all 0.2s; border-width: 2px; }
        .tire-btn.active { opacity: 1; transform: scale(1); box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .tire-soft.active { border-color: #ef4444; color: #ef4444; } 
        .tire-medium.active { border-color: #eab308; color: #eab308; } 
        .tire-hard.active { border-color: #f8fafc; color: #f8fafc; } 
        
        .option-btn { transition: all 0.1s; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .option-btn:active:not(:disabled) { transform: scale(0.96); background: rgba(255, 255, 255, 0.2); }
        .option-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }

        @media only screen and (max-width: 768px) {
            html { font-size: clamp(12px, 3.5vw, 16px); }
            .carbon-bg { background-attachment: scroll; min-height: 100vh; }
        }

        /* --- 新規追加：テレメトリー・モーダルとボタンのスタイル --- */
        
        /* 1. ブリーフィングボタン */
        #briefing-btn {
            background: transparent !important;
            border: 1px solid #f39c12 !important;
            color: #f39c12 !important;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        #briefing-btn:hover {
            background: rgba(243, 156, 18, 0.1) !important;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
            transform: translateY(-1px);
        }

        #briefing-btn:active {
            transform: translateY(0);
        }

        /* 2. モーダル背景 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            z-index: 200; 
            display: none; 
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* 3. モーダル本体（機密モニター風） */
        .modal-content {
            background: rgba(11, 14, 20, 0.95) !important;
            border-left: 4px solid #e10600 !important;
            border-top: 1px solid rgba(255,255,255,0.1) !important;
            border-right: 1px solid rgba(255,255,255,0.1) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(225, 6, 0, 0.05);
            width: 90%;
            max-width: 650px;
            max-height: 80vh;
            padding: 2rem;
            border-radius: 4px;
            position: relative;
            overflow-y: auto;
            color: #e2e8f0;
        }
        
        .modal-content::-webkit-scrollbar { display: none; }
        .modal-content { scrollbar-width: none; }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
        }
        
        .close-btn:hover { color: #fff; }

        /* 4. モーダル内の文字装飾 */
        #briefing-title {
            font-family: 'Chakra Petch', sans-serif;
            font-style: italic;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            font-size: 1.5rem;
        }

        .explanation-content h3 {
            color: #e10600;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .explanation-content h3::before {
            content: '▶';
            font-size: 0.7rem;
        }

        .explanation-content p {
            line-height: 1.6;
            color: #cbd5e1;
            margin: 0.8rem 0;
        }

        .explanation-content table {
            border: none;
            background: rgba(255,255,255,0.03);
            margin: 1.5rem 0;
            width: 100%;
            border-collapse: collapse;
        }

        .explanation-content th {
            background: rgba(225, 6, 0, 0.15);
            color: #fff;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .explanation-content td {
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
    </style>
</head>
<body class="carbon-bg text-sm md:text-base">

    <img id="custom-bg-img" src="" alt="">

    <!-- HUD -->
    <div id="stint-timer-hud" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] bg-black/80 border-b-2 border-red-600 px-6 py-2 rounded-b-xl flex items-center gap-4 shadow-2xl backdrop-blur-md">
        <div class="flex flex-col items-start">
            <span class="text-[8px] text-red-500 font-bold uppercase tracking-tighter leading-none">Live Stint Time</span>
            <span id="stint-clock" class="f1-font text-white text-xl font-bold leading-none">00:00</span>
        </div>
        <div id="red-flag-indicator" class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
            <span class="text-[10px] text-yellow-500 font-bold uppercase">Garage</span>
        </div>
    </div>

    <div id="app" class="w-full max-w-6xl mx-auto flex flex-col">
        
        <!-- GATE SCREEN -->
        <div id="gate-screen" class="race-card p-8 rounded-2xl shadow-2xl text-center relative overflow-hidden animate-slide-in my-auto max-w-md mx-auto w-full">
            <div class="flex justify-center mb-6">
                <img id="gate-app-icon" src="" class="w-24 h-24 rounded-2xl border-2 border-gray-700 object-cover shadow-lg hidden">
            </div>
            <h1 class="f1-font text-5xl mb-2 font-bold text-white italic tracking-wider">RB<span class="text-red-600">-28</span></h1>
            <p class="text-gray-400 font-mono text-xs uppercase tracking-[0.4em] mb-12">Chem Hybrid Evolution</p>
            <button id="gate-login-btn" class="w-full f1-font bg-white hover:bg-gray-200 text-black px-8 py-4 rounded-xl font-bold uppercase active:scale-95 transition-all shadow-[0_0_15px_rgba(255,255,255,0.4)]">Engage Engine</button>
        </div>

        <!-- NEW TAKUMA-STYLE START SCREEN -->
        <div id="start-screen" class="hidden race-card p-4 md:p-6 rounded-2xl relative z-10 animate-slide-in my-auto w-full max-w-5xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                
                <!-- 左側：ドライバー情報＆スタートボタン -->
                <div class="md:col-span-5 flex flex-col gap-6">
                    <div class="flex justify-between items-end border-b border-gray-700 pb-4">
                        <div class="flex items-center gap-3">
                            <div id="paddock-icon-container" class="w-8 h-8 rounded-full bg-gray-800 border border-gray-500 overflow-hidden flex items-center justify-center hidden">
                                <img id="paddock-app-icon" src="" class="w-full h-full object-cover">
                            </div>
                            <div id="default-paddock-icon" class="w-3 h-3 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                            <p id="user-name" class="f1-font text-xl text-white font-bold truncate">HIRO</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-gray-500 uppercase tracking-widest block">Stint Status</span>
                            <span class="f1-font text-sm text-green-500 font-bold">OPTIMAL</span>
                        </div>
                    </div>

                    <!-- テレメトリーダミー表示 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-red-900/20 p-4 rounded-xl border border-red-900/30 text-center relative overflow-hidden">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Engine Map</p>
                            <span class="f1-font text-xl text-red-500 font-bold">AGGRESSIVE</span>
                        </div>
                        <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-900/30 text-center relative overflow-hidden">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Downforce</p>
                            <span class="f1-font text-xl text-blue-400 font-bold">MAXIMUM</span>
                        </div>
                    </div>

                    <div class="mt-auto flex flex-col gap-3">
                        <button onclick="quiz.startRace()" class="w-full f1-font bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white py-6 rounded-xl font-bold tracking-[0.2em] uppercase transition-all transform active:scale-[0.98] shadow-lg shadow-red-900/40 text-2xl border-b-4 border-red-900 flex items-center justify-center gap-3">
                            Start Race
                        </button>
                    </div>
                </div>

                <!-- 右側：Race Strategy -->
                <div class="md:col-span-7 flex flex-col gap-4 border-t md:border-t-0 md:border-l border-gray-700 pt-6 md:pt-0 md:pl-8">
                    
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-gray-400">⚙️</span>
                        <h3 class="f1-font text-lg font-bold text-white tracking-widest uppercase">Race Strategy</h3>
                        <p id="strategy-summary" class="ml-auto text-[10px] text-gray-500 font-mono border border-gray-700 px-2 py-1 rounded bg-black/50"></p>
                    </div>

                    <div class="space-y-5">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="text-gray-500 text-[10px] uppercase tracking-widest block mb-2">Category (Sector)</label>
                                <div class="relative">
                                    <select id="category-selector" class="w-full bg-black/50 text-white p-3 rounded-lg border border-gray-600 focus:border-red-500 outline-none font-mono text-xs appearance-none cursor-pointer hover:bg-black/70 transition-colors" onchange="quiz.updateSubCategories()"></select>
                                    <div class="absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none text-gray-500">▼</div>
                                </div>
                            </div>
                            <div>                                    
                                <label class="text-gray-500 text-[10px] uppercase tracking-widest block mb-2">Sub Category (Corner)</label>
                                <div class="relative">
                                    <select id="sub-category-selector" class="w-full bg-black/50 text-white p-3 rounded-lg border border-gray-600 focus:border-red-500 outline-none font-mono text-xs appearance-none cursor-pointer hover:bg-black/70 transition-colors" onchange="quiz.updateSummary()"></select>
                                    <div class="absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none text-gray-500">▼</div>
                                </div>
                            </div>
                        </div> 

                        <div>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3">Tire Strategy (Questions per Lap)</p>
                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="quiz.setTire(10, 'soft')" id="tire-soft" class="tire-btn tire-soft bg-black/40 text-gray-400 py-3 rounded-lg border border-gray-700 f1-font text-xs font-bold uppercase tracking-wider hover:bg-gray-800">
                                    <span class="block text-xs mb-1">🔴 Soft</span>
                                    <span class="text-[10px] opacity-70">(10 Qs)</span>
                                </button>
                                <button onclick="quiz.setTire(20, 'medium')" id="tire-medium" class="tire-btn tire-medium active bg-black/40 text-gray-400 py-3 rounded-lg border border-gray-700 f1-font text-xs font-bold uppercase tracking-wider hover:bg-gray-800">
                                    <span class="block text-xs mb-1">🟡 Medium</span>
                                    <span class="text-[10px] opacity-70">(20 Qs)</span>
                                </button>
                                <button onclick="quiz.setTire(999, 'hard')" id="tire-hard" class="tire-btn tire-hard bg-black/40 text-gray-400 py-3 rounded-lg border border-gray-700 f1-font text-xs font-bold uppercase tracking-wider hover:bg-gray-800">
                                    <span class="block text-xs mb-1">⚪ Hard</span>
                                    <span class="text-[10px] opacity-70">(ALL)</span>
                                </button>
                            </div>
                        </div>

                        <!-- コース解説（ブリーフィング）ボタン -->
                        <div class="pt-2">
                            <button id="briefing-btn">
                                <svg xmlns="http://www.w3.org/-2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                Telemetry Briefing
                            </button>
                        </div>

                        <div class="grid grid-cols-1 gap-4 border-t border-gray-800 pt-4">
                             <label class="flex items-center justify-between cursor-pointer group bg-black/30 p-4 rounded-lg border border-gray-800 hover:border-gray-600 transition-colors">
                                <span class="text-xs font-bold text-gray-300 group-hover:text-cyan-400 transition-colors flex items-center gap-2"><span class="text-cyan-400">🔄</span> REVERSE GRID (解答→問題)</span>
                                <input type="checkbox" id="reverse-mode" class="w-5 h-5 cursor-pointer accent-red-600" onchange="quiz.updateSummary()">
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden race-card p-6 rounded-2xl shadow-2xl relative flex flex-col justify-between my-auto min-h-[500px] w-full max-w-4xl mx-auto z-20">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="quiz-title" class="f1-font text-[10px] text-gray-400 uppercase tracking-widest">SECTION</span>
                    <h4 id="lap-counter" class="f1-font text-white font-bold text-xl">LAP 1/20</h4>
                </div>
                <div id="timer" class="f1-font text-3xl text-yellow-400 font-mono tracking-tighter">0.00s</div>
            </div>
            
            <div class="flex-grow flex flex-col justify-center items-center py-4">
                <h2 id="target-word" class="font-bold text-white text-lg md:text-2xl max-w-2xl w-full text-left border-l-4 border-red-600 pl-4 py-2 leading-relaxed bg-transparent drop-shadow-lg"></h2>
                <div id="options-container" class="grid grid-cols-1 gap-3 mt-8 w-full max-w-2xl"></div>
            </div>
            <div id="feedback" class="h-8 mt-4 text-center font-bold uppercase tracking-widest"></div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="hidden race-card p-8 rounded-2xl shadow-2xl text-center animate-slide-in my-auto max-w-2xl mx-auto w-full z-20">
            <h2 class="f1-font text-4xl mb-2 font-bold text-white italic">CHECKERED FLAG</h2>
            <div id="accuracy-display" class="f1-font text-8xl font-bold mb-4 text-white">0%</div>
            <p id="rank-text" class="text-gray-400 font-mono mb-10">P1: MAX VERSTAPPEN</p>
            <button onclick="quiz.returnToPaddock()" class="w-full max-w-sm f1-font bg-red-600 text-white py-4 rounded-xl font-bold uppercase shadow-lg shadow-red-900/50">Return to Garage</button>
        </div>
    </div>

    <!-- 解説モーダル -->
    <div id="briefing-modal" class="modal">
        <div class="modal-content">
            <span id="close-briefing" class="close-btn">&times;</span>
            <h2 id="briefing-title">カテゴリー名</h2>
            <div id="briefing-text" class="explanation-content">
                <!-- ここに data.js の内容がJSで流し込まれる -->
            </div>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        document.addEventListener('dblclick', function(event) { event.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', function(event) { if (event.scale !== 1) { event.preventDefault(); } }, { passive: false });

        class ChemQuizV12 {
            constructor() {
                if (typeof appData === 'undefined') {
                    alert("Telemetry Error: data.js が見つからない。同じフォルダに作成しろ。");
                    return;
                }

                this.masterQuestions = [];
                this.questions = [];
                this.globalAnswers = [];
                this.globalQuestions = [];
                this.currentIndex = 0;
                this.missCount = 0;
                this.tireLimit = 20;
                this.stintTime = 0;
                this.stintInterval = null;
                this.stintActive = false;
                this.isLocked = false; 

                this.applyConfig(); 
                this.buildGlobalPool();
                this.initStint();
                this.initUI();
            }

            applyConfig() {
                if (typeof appConfig === 'undefined') return;
                if (appConfig.wallpaperUrl) document.getElementById('custom-bg-img').src = appConfig.wallpaperUrl;
                if (appConfig.appIconUrl) {
                    const gateIcon = document.getElementById('gate-app-icon');
                    gateIcon.src = appConfig.appIconUrl;
                    gateIcon.classList.remove('hidden');

                    const paddockIconContainer = document.getElementById('paddock-icon-container');
                    const paddockIcon = document.getElementById('paddock-app-icon');
                    const defaultIcon = document.getElementById('default-paddock-icon');
                    paddockIcon.src = appConfig.appIconUrl;
                    paddockIconContainer.classList.remove('hidden');
                    defaultIcon.classList.add('hidden');
                    document.getElementById('apple-touch-icon').href = appConfig.appIconUrl;
                }
            }

            buildGlobalPool() {
                let ansPool = [];
                let qPool = [];
                for (let cat in appData) {
                    for (let sub in appData[cat]) {
                        const raw = appData[cat][sub];
                        const parsed = raw.trim().split('\n').map(line => {
                            const m = line.match(/^(?:\d+\.\s*)?(.*?)(?:【解答】|\[解答\])\s*(.*)$/);
                            return m ? { q: m[1].trim(), a: m[2].trim() } : null;
                        }).filter(x => x);
                        parsed.forEach(p => { ansPool.push(p.a); qPool.push(p.q); });
                    }
                }
                this.globalAnswers = [...new Set(ansPool)];
                this.globalQuestions = [...new Set(qPool)];
            }

            formatChem(text) {
                if (!text) return "";
                let formatted = text.replace(/\((\d*[\+\-])\)/g, '<sup>$1</sup>');
                formatted = formatted.replace(/([a-zA-Z\]])(\d+[\+\-]|[\+\-])(?![a-zA-Z0-9])/g, '$1<sup>$2</sup>');
                formatted = formatted.replace(/([a-zA-Z\)])(\d+)/g, '$1<sub>$2</sub>');
                return formatted;
            }

            initStint() {
                const today = new Date().toDateString();
                if (localStorage.getItem('chem_date') === today) {
                    this.stintTime = parseInt(localStorage.getItem('chem_time')) || 0;
                } else {
                    localStorage.setItem('chem_date', today);
                }
                this.updateHUD();
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden && this.stintActive) this.pauseTimer();
                    else if (!document.hidden && this.stintActive) this.resumeTimer();
                });
            }

            initUI() {
                document.getElementById('gate-login-btn').onclick = () => {
                    document.getElementById('gate-screen').classList.add('hidden');
                    document.getElementById('start-screen').classList.remove('hidden');
                    this.stintActive = true;
                    this.resumeTimer();
                    this.renderSelectors();
                };
            }

            renderSelectors() {
                const catSelector = document.getElementById('category-selector');
                const categories = Object.keys(appData);
                catSelector.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
                this.updateSubCategories();
            }

            updateSubCategories() {
                const catSelector = document.getElementById('category-selector');
                const subSelector = document.getElementById('sub-category-selector');
                
                this.currentCat = catSelector.value;
                const subs = Object.keys(appData[this.currentCat] || {});
                subSelector.innerHTML = subs.map(sub => `<option value="${sub}">${sub}</option>`).join('');
                
                this.updateSummary();
            }

            updateSummary() {
                const sub = document.getElementById('sub-category-selector').value;
                const rev = document.getElementById('reverse-mode').checked ? "REV" : "STD";
                const tireStr = this.tireLimit === 999 ? "ALL" : this.tireLimit;
                document.getElementById('strategy-summary').innerText = `Setup: ${sub} | ${tireStr} Qs | ${rev}`;
            }

            setTire(limit, type) {
                this.tireLimit = limit;
                document.querySelectorAll('.tire-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tire-${type}`).classList.add('active');
                this.updateSummary();
            }

            startRace() {
                this.currentCat = document.getElementById('category-selector').value;
                this.currentSub = document.getElementById('sub-category-selector').value;

                if (!this.currentCat || !this.currentSub) {
                    alert("Telemetry Error: カテゴリが選択されていない。");
                    return;
                }

                const raw = appData[this.currentCat][this.currentSub];
                const parsed = raw.trim().split('\n').map(line => {
                    const m = line.match(/^(?:\d+\.\s*)?(.*?)(?:【解答】|\[解答\])\s*(.*)$/);
                    return m ? { q: m[1].trim(), a: m[2].trim() } : null;
                }).filter(x => x);

                if (parsed.length === 0) { alert("No valid data found in this sector."); return; }

                this.masterQuestions = parsed;
                this.isReverse = document.getElementById('reverse-mode').checked;
                
                document.getElementById('quiz-title').innerText = `${this.currentCat} - ${this.currentSub}`;
                
                this.questions = [...parsed].sort(() => Math.random() - 0.5).slice(0, this.tireLimit);
                this.currentIndex = 0;
                this.missCount = 0;
                this.isLocked = false;
                this.startTime = Date.now();
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                
                this.lapInterval = setInterval(() => {
                    document.getElementById('timer').innerText = ((Date.now() - this.startTime)/1000).toFixed(2) + 's';
                }, 50);
                this.showQuestion();
            }

            showQuestion() {
                const q = this.questions[this.currentIndex];
                document.getElementById('lap-counter').innerText = `LAP ${this.currentIndex + 1}/${this.questions.length}`;
                
                const rawQText = this.isReverse ? q.a : q.q;
                document.getElementById('target-word').innerHTML = this.formatChem(rawQText);
                
                const ans = this.isReverse ? q.q : q.a;
                let globalPool = this.isReverse ? this.globalQuestions : this.globalAnswers;
                let pool = globalPool.filter(x => x !== ans);

                pool.sort((a, b) => {
                    let scoreA = 0; let scoreB = 0;
                    scoreA -= Math.abs(a.length - ans.length);
                    scoreB -= Math.abs(b.length - ans.length);
                    const hasA = (str) => /A[:：]/.test(str);
                    if (hasA(ans)) {
                        if (hasA(a)) scoreA += 100; if (hasA(b)) scoreB += 100;
                    } else {
                        if (hasA(a)) scoreA -= 100; if (hasA(b)) scoreB -= 100;
                    }
                    const hasIneq = (str) => /[<><＞＜]/.test(str);
                    if (hasIneq(ans)) {
                        if (hasIneq(a)) scoreA += 100; if (hasIneq(b)) scoreB += 100;
                    } else {
                        if (hasIneq(a)) scoreA -= 100; if (hasIneq(b)) scoreB -= 100;
                    }
                    return scoreB - scoreA; 
                });

                let topCandidates = pool.slice(0, 8).sort(() => Math.random() - 0.5);
                let distractors = topCandidates.slice(0, 3);

                if (!this.isReverse && /A[:：].*B[:：]/.test(ans)) {
                    let swapped = ans.replace(/(A[:：])([^,、]+)([,、]\s*B[:：])(.+)/, '$1$4$3$2');
                    if (swapped !== ans && !distractors.includes(swapped)) {
                        distractors.pop(); distractors.push(swapped); 
                    }
                }

                while (distractors.length < 3) distractors.push(`[Dummy] データ不足 ${distractors.length + 1}`);

                let options = [ans, ...distractors].sort(() => Math.random() - 0.5);

                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full bg-black/40 text-white drop-shadow-md p-4 rounded-xl text-left text-sm md:text-base font-bold transition-all hover:bg-white/10 active:scale-95";
                    btn.innerHTML = this.formatChem(opt);
                    btn.onclick = () => this.handleAns(opt, ans);
                    container.appendChild(btn);
                });
            }

            handleAns(selected, correct) {
                if (this.isLocked) return;
                this.isLocked = true;

                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);

                const feedback = document.getElementById('feedback');
                
                if (selected === correct) {
                    feedback.innerHTML = '<span class="text-green-500">PURPLE SECTOR</span>';
                    setTimeout(() => {
                        feedback.innerText = "";
                        this.currentIndex++;
                        this.isLocked = false;
                        if (this.currentIndex < this.questions.length) this.showQuestion();
                        else this.finish();
                    }, 400);
                } else {
                    this.missCount++;
                    feedback.innerHTML = '<span class="text-red-600 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]">DAMAGE DETECTED</span>';
                    
                    const q = this.questions[this.currentIndex];
                    const remainingLength = this.questions.length - 1 - this.currentIndex;
                    
                    if (remainingLength <= 2) {
                        this.questions.push(q);
                    } else {
                        const insertIndex = this.currentIndex + 2 + Math.floor(Math.random() * (remainingLength - 1));
                        this.questions.splice(insertIndex, 0, q);
                    }

                    setTimeout(() => { 
                        feedback.innerText = ""; 
                        this.isLocked = false; 
                        this.showQuestion(); 
                    }, 1000);
                }
            }

            finish() {
                clearInterval(this.lapInterval);
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                const acc = ((this.questions.length - this.missCount) / this.questions.length * 100).toFixed(1);
                document.getElementById('accuracy-display').innerText = `${acc}%`;
                document.getElementById('rank-text').innerText = `TIME: ${document.getElementById('timer').innerText} | MISSES: ${this.missCount}`;
            }

            returnToPaddock() {
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            }

            resumeTimer() {
                this.pauseTimer();
                const ind = document.getElementById('red-flag-indicator');
                ind.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div><span class="text-[10px] text-green-500 font-bold uppercase">Green Flag</span>`;
                this.stintInterval = setInterval(() => {
                    this.stintTime++;
                    localStorage.setItem('chem_time', this.stintTime);
                    this.updateHUD();
                }, 1000);
            }

            pauseTimer() {
                clearInterval(this.stintInterval);
                const ind = document.getElementById('red-flag-indicator');
                if(ind) ind.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-600"></div><span class="text-[10px] text-red-600 font-bold uppercase">Red Flag</span>`;
            }

            updateHUD() {
                const m = String(Math.floor(this.stintTime / 60)).padStart(2, '0');
                const s = String(this.stintTime % 60).padStart(2, '0');
                document.getElementById('stint-clock').innerText = `${m}:${s}`;
            }
        }
        
        window.quiz = new ChemQuizV12();

        // --- コース解説（ブリーフィング）モーダルの制御 ---
        const briefingBtn = document.getElementById('briefing-btn');
        const briefingModal = document.getElementById('briefing-modal');
        const closeBriefingBtn = document.getElementById('close-briefing');
        const briefingTitle = document.getElementById('briefing-title');
        const briefingText = document.getElementById('briefing-text');
        const subSelector = document.getElementById('sub-category-selector');

        briefingBtn.onclick = () => {
            const selectedSub = subSelector.value;
            
            if (typeof explanations !== 'undefined' && explanations[selectedSub]) {
                briefingTitle.textContent = selectedSub + " : Telemetry Briefing";
                briefingText.innerHTML = explanations[selectedSub];
                briefingModal.style.display = "flex"; 
            } else {
                alert("Telemetry Error: このセクター「" + selectedSub + "」の解説データはまだロードされていない。");
            }
        };

        closeBriefingBtn.onclick = () => {
            briefingModal.style.display = "none";
        };

        window.onclick = (event) => {
            if (event.target == briefingModal) {
                briefingModal.style.display = "none";
            }
        };
    </script>
</body>
</html>
